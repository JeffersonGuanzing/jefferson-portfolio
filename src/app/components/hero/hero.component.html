<section id="hero" class="hero-section">
    <div class="grid-bg"></div>
    <div class="scanlines"></div>
    <div class="particles-container">
        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
    </div>

    <div class="container hero-container">
        <div class="hero-content">
            <div class="system-tag-container">
                <p class="mono-font accent-cyan system-tag">
                    <span class="tag-label">/system_init:</span>
                    <span class="tag-status">INITIALIZED</span>
                </p>
            </div>

            <div class="name-container">
                <h1 class="hero-name display-font">
                    <span class="first-name">JEFFERSON</span>
                    <span class="last-name">GUANZING</span>
                </h1>
            </div>

            <div class="typewriter-container glass-panel">
                <span class="typewriter-text mono-font">{{ currentRole() }}</span>
                <span class="cursor">_</span>
            </div>

            <p class="hero-bio">
                Over 2 years of experience crafting <span class="highlight">high-performance</span> fintech and web
                systems.
                Specialized in <span class="highlight">C#</span>, <span class="highlight">.NET Core</span>, and robust
                <span class="highlight">API Architectures</span>.
            </p>

            <div class="hero-actions">
                <button mat-flat-button class="btn-primary glow-teal" (click)="scrollToSection('experience')">
                    VIEW MY WORK
                </button>
                <a mat-stroked-button class="btn-secondary cv-btn glass-panel" href="Jefferson-Guanzing-Resume.pdf"
                    target="_blank" download="Jefferson-Guanzing-Resume.pdf">
                    <mat-icon>download</mat-icon>
                    DOWNLOAD CV
                </a>
            </div>
        </div>
    </div>

    <div class="scroll-indicator" (click)="scrollToSection('about')">
        <span class="mono-font">SCROLL_DOWN</span>
        <mat-icon class="scroll-icon">expand_more</mat-icon>
    </div>
</section>
