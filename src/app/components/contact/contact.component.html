<section id="contact" class="contact-section footer">
    <div class="container text-center">
        <h2 class="syne-800 display-heading">Let's Build Something Together.</h2>

        <div class="contact-methods">
            <mat-list>
                <mat-list-item *ngFor="let item of contactItems">
                    <mat-icon matListItemIcon class="accent-text">{{ item.icon }}</mat-icon>
                    <a *ngIf="item.url" [href]="item.url" target="_blank" class="contact-link mono-font">{{ item.text }}</a>
                    <span *ngIf="!item.url" class="mono-font">{{ item.text }}</span>
                </mat-list-item>
            </mat-list>
        </div>

        <div class="contact-form-container">
            <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="contact-form">
                <div class="form-row">
                    <mat-form-field appearance="outline" class="form-field">
                        <mat-label>Name</mat-label>
                        <input matInput formControlName="name" placeholder="Your Name">
                        <mat-error *ngIf="contactForm.get('name')?.hasError('required')">Name is required</mat-error>
                    </mat-form-field>

                    <mat-form-field appearance="outline" class="form-field">
                        <mat-label>Email</mat-label>
                        <input matInput formControlName="email" placeholder="Your Email" type="email">
                        <mat-error *ngIf="contactForm.get('email')?.hasError('required')">Email is required</mat-error>
                        <mat-error *ngIf="contactForm.get('email')?.hasError('email')">Invalid email format</mat-error>
                    </mat-form-field>
                </div>

                <mat-form-field appearance="outline" class="form-field full-width">
                    <mat-label>Subject</mat-label>
                    <input matInput formControlName="subject" placeholder="Subject">
                    <mat-error *ngIf="contactForm.get('subject')?.hasError('required')">Subject is required</mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="form-field full-width">
                    <mat-label>Message</mat-label>
                    <textarea matInput formControlName="message" placeholder="Your Message" rows="5"></textarea>
                    <mat-error *ngIf="contactForm.get('message')?.hasError('required')">Message is required</mat-error>
                </mat-form-field>

                <div class="contact-actions">
                    <button mat-raised-button color="accent" class="huge-btn glow-teal" type="submit" [disabled]="contactForm.invalid || isSubmitting">
                        {{ isSubmitting ? 'SENDING...' : 'SEND MESSAGE' }}
                    </button>
                </div>
            </form>
        </div>

        <div class="footer-bottom">
            <p class="mono-font">© 2025 Jefferson Guanzing. Built with Angular & Angular Material.</p>
        </div>
    </div>
</section>
