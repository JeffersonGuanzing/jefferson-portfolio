<section id="skills" class="skills-section container">
    <div class="section-tag mono-font">/technical_vitals</div>

    <div class="skills-grid">
        <mat-card class="skill-group-card glow-teal" *ngFor="let group of skillGroups">
            <mat-card-header>
                <mat-card-title class="syne-800">{{ group.name }}</mat-card-title>
            </mat-card-header>
            <mat-card-content>
                <mat-chip-set aria-label="Skill selection">
                    <mat-chip *ngFor="let skill of group.skills" class="skill-chip mono-font">
                        {{ skill }}
                    </mat-chip>
                </mat-chip-set>
            </mat-card-content>
        </mat-card>
    </div>
</section>
